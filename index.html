<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping • Minimalist Email Sender</title>
    
    <!-- Tailwind CSS for modern, clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- EmailJS SDK to handle client-side email delivery -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // 1. TODO: Replace with your actual EmailJS Public Key
          emailjs.init("b0SnwtlH1gxzwRdg3");
       })();
    </script>
</head>
<body class="bg-gradient-to-tr from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-6 font-sans antialiased">

    <!-- Main Card Container -->
    <div class="w-full max-w-md bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-2xl shadow-slate-200/80 border border-slate-100/50 transition-all duration-300 hover:shadow-cyan-100/40">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-cyan-50 text-cyan-500 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </div>
            <h1 class="text-2xl font-semibold text-slate-800 tracking-tight">EMAIL TEST</h1>
            <p class="text-sm text-slate-400 mt-1.5">Enter your email to receive a sleek verification ping shit.</p>
        </div>

        <!-- Form -->
        <form id="email-form" class="space-y-5">
            <div>
                <label for="user-email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="user-email" 
                    required 
                    placeholder="name@domain.com" 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50/50 border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 transition-all duration-200 text-sm"
                >
            </div>

            <button 
                type="submit" 
                id="submit-btn"
                class="w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl shadow-lg shadow-slate-900/10 active:scale-[0.99] transition-all duration-200 text-sm flex items-center justify-center gap-2"
            >
                <span>Send Ping</span>
            </button>
        </form>

        <!-- Status Notifications -->
        <div id="status-msg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <!-- Frontend Form Handler Logic -->
    <script>
        const form = document.getElementById('email-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('user-email').value;

            // Trigger Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sending...</span>
            `;

            // 2. These parameters must map to the variables inside your EmailJS Template
            const templateParams = {
                to_email: emailInput,
                message: "Hello! This is a dynamic verification message sent straight from your gorgeous GitHub website. High five! 🚀"
            };

            // 3. TODO: Replace with your actual EmailJS Service ID and Template ID
            emailjs.send('service_am6j11e', 'template_qgn71hc', templateParams)
                .then(() => {
                    // Smooth Success State
                    statusMsg.textContent = "✨ Message sent! Check your inbox shawty.";
                    statusMsg.className = "mt-6 text-center text-sm font-medium text-emerald-600 bg-emerald-50 py-2.5 rounded-xl border border-emerald-100 block animate-fade-in";
                    form.reset();
                })
                .catch((error) => {
                    // Smooth Error State
                    console.error('EmailJS Error:', error);
                    statusMsg.textContent = "✕ Setup required. Check your API keys.";
                    statusMsg.className = "mt-6 text-center text-sm font-medium text-rose-600 bg-rose-50 py-2.5 rounded-xl border border-rose-100 block";
                })
                .finally(() => {
                    // Revert Button UI
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Send Ping</span>';
                });
        });
    </script>
</body>
</html>
